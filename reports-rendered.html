<body>
    <div class="container">
                        
            <h2>Daily Machine-Section Report</h2>

    <div class="form-group" style="margin: 20px 0;">
        <label for="reportDate" style="font-weight: bold; margin-right: 10px;">Select Date: </label>
        <input type="date" id="reportDate" class="form-control" required style="display: inline-block; width: auto; margin-right: 10px;">
        <button onclick="fetchReport()" class="btn btn-primary">Fetch Data</button>
    </div>

    <div id="reportTable"></div>
    </div>

    <script>
        // Set up CSRF token for AJAX requests
        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        
        // Helper function for AJAX requests
        async function makeRequest(url, options = {}) {
            const defaultOptions = {
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-TOKEN': csrfToken,
                    'Accept': 'application/json'
                }
            };
            
            const mergedOptions = {
                ...defaultOptions,
                ...options,
                headers: {
                    ...defaultOptions.headers,
                    ...options.headers
                }
            };
            
            try {
                const response = await fetch(url, mergedOptions);
                
                // Try to parse JSON response
                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    // If response is not JSON, create error message
                    const text = await response.text();
                    throw new Error(text || 'Invalid response from server');
                }
                
                if (!response.ok) {
                    // Handle validation errors
                    if (data.errors) {
                        const errorMessages = Object.values(data.errors).flat().join(', ');
                        throw new Error(errorMessages);
                    }
                    throw new Error(data.message || data.error || 'Request failed');
                }
                
                return data;
            } catch (error) {
                console.error('Request error:', error);
                throw error;
            }
        }
    </script>
    <script>
    // Set default date to today on page load
    document.addEventListener('DOMContentLoaded', function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('reportDate').value = today;
    });

    function getShiftLabel(datetimeValue) {
        if (!datetimeValue) {
            return '-';
        }

        const date = new Date(datetimeValue);
        if (isNaN(date.getTime())) {
            return '-';
        }

        const hour = date.getUTCHours();
        return (hour >= 8 && hour < 20) ? 'Day' : 'Night';
    }
    
    async function fetchReport() {
        const date = document.getElementById('reportDate').value;
        
        if (!date) {
            alert("Please select a date");
            return;
        }

        const reportDiv = document.getElementById('reportTable');
        reportDiv.innerHTML = `<p style="text-align: center; padding: 20px;">Loading report for <strong>${date}</strong>...</p>`;

        try {
            // Get CSRF token
            const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';
            
            if (!csrfToken) {
                throw new Error('CSRF token not found. Please refresh the page.');
            }
            
            // Use fetch directly with proper error handling
            const response = await fetch('/api/reports/daily', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json',
                    'X-CSRF-TOKEN': csrfToken,
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: JSON.stringify({ date: date })
            });
            
            if (!response.ok) {
                let errorMessage = `Server error: ${response.status}`;
                try {
                    const errorData = await response.json();
                    errorMessage = errorData.message || errorData.error || errorMessage;
                } catch (e) {
                    const errorText = await response.text();
                    errorMessage = errorText || errorMessage;
                }
                throw new Error(errorMessage);
            }
            
            const data = await response.json();

            if (data.success) {
                if (!data.data || data.data.length === 0) {
                    reportDiv.innerHTML = `<p style="color: #666; font-style: italic;">No data found for ${date}</p>`;
                    return;
                }

                // Format date for display (convert YYYY-MM-DD to DD-MM-YYYY)
                const dateParts = data.date.split('-');
                const displayDate = `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`;
                
                let html = `
                    <h3>Report for ${displayDate}</h3>
                    <style>
                        .report-table {
                            width: 100%;
                            border-collapse: collapse;
                            margin-top: 20px;
                            font-size: 14px;
                        }
                        .report-table th, .report-table td {
                            padding: 10px;
                            border: 1px solid #ddd;
                            text-align: left;
                        }
                        .report-table th {
                            background-color: #f0f0f0;
                            font-weight: bold;
                            text-align: center;
                        }
                        .report-table td {
                            text-align: center;
                        }
                        .machine-header {
                            background-color: #e0e0e0;
                            font-weight: bold;
                            font-size: 16px;
                        }
                        .section-header {
                            background-color: #f5f5f5;
                            font-weight: bold;
                        }
                    </style>
                    <table class="report-table">
                        <thead>
                            <tr>
                                <th>Machine</th>
                                <th>Section</th>
                                <th>Cycle</th>
                                <th>Shift</th>
                                <th>End Date & Time</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                data.data.forEach((record, index) => {
                    html += `
                        <tr>
                            <td class="machine-header">${record.machine}</td>
                            <td class="section-header">${record.section}</td>
                            <td><span style="background: #e9ecef; padding: 2px 6px; border-radius: 4px; font-weight: bold; border: 1px solid #ccc;">${record.cycle || '-'}</span></td>
                            <td>${getShiftLabel(record.end_datetime)}</td>
                            <td><span style="color: #198754; font-weight: bold;">✅ ${record.end_datetime_display}</span></td>
                        </tr>
                    `;
                });

                html += `
                        </tbody>
                    </table>
                `;
                reportDiv.innerHTML = html;
            } else {
                reportDiv.innerHTML = `<p style="color:red;">Error: ${data.message || 'Failed to fetch report'}</p>`;
            }
        } catch (error) {
            console.error("Error fetching report:", error);
            reportDiv.innerHTML = `<p style="color:red;">Error loading data: ${error.message || 'An unexpected error occurred'}</p>`;
        }
    }
</script>
